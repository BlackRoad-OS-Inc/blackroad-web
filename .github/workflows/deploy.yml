name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_GATEWAY_URL: ${{ vars.NEXT_PUBLIC_GATEWAY_URL || 'https://gateway.blackroad.io' }}
          NEXT_PUBLIC_AGENTS_API_URL: ${{ vars.NEXT_PUBLIC_AGENTS_API_URL || 'https://agents.blackroad.io' }}
      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages project create blackroad-web --production-branch main 2>/dev/null || true && npx wrangler pages deploy .next/static --project-name=blackroad-web --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
