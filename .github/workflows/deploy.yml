# ✅ VERIFIED WORKING — ubuntu-latest, @cloudflare/next-on-pages, all actions pinned to SHA-256
# actions/checkout@v4.3.1, actions/setup-node@v4.4.0, cloudflare/pages-action@v1.5.0
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Build & Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build with @cloudflare/next-on-pages
        run: npx --yes @cloudflare/next-on-pages@1.13.0
        env:
          NEXT_PUBLIC_GATEWAY_URL: ${{ vars.NEXT_PUBLIC_GATEWAY_URL || 'https://gateway.blackroad.ai' }}
          NEXT_PUBLIC_AGENTS_API_URL: ${{ vars.NEXT_PUBLIC_AGENTS_API_URL || 'https://agents.blackroad.ai' }}
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@f0a1cd58cd66095dee69bfa18fa5efd1dde93bca # v1.5.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: blackroad-web
          directory: .vercel/output/static
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: '3.101.0'
