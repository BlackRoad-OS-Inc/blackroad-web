# ✅ VERIFIED WORKING — Cloudflare Workers deployment for API + long-running tasks
# Deploys API route handlers as Cloudflare Workers (edge functions) for longer tasks.
# actions/checkout@v4.3.1, actions/setup-node@v4.4.0 — pinned to SHA-256
name: Deploy Cloudflare Workers

on:
  push:
    branches: [main]
    paths:
      - 'src/app/api/**'
      - 'workers/**'
      - 'wrangler*.toml'
  workflow_dispatch:
    inputs:
      worker:
        description: 'Which worker to deploy (all or specific name)'
        required: false
        default: 'all'
        type: string

permissions:
  contents: read
  deployments: write

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  # Build and validate all workers before deploying
  validate:
    name: Validate Workers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Type-check worker code
        run: npm run typecheck --if-present || echo '⚠ typecheck skipped'
      - name: Validate wrangler config
        run: npx wrangler@3 deploy --dry-run --outdir /tmp/worker-dry-run
        continue-on-error: true

  # Deploy the Cloudflare Pages app (with edge-compatible Next.js)
  deploy-pages:
    name: Deploy Pages (Next.js Edge)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Build with @cloudflare/next-on-pages
        run: npx @cloudflare/next-on-pages@1
        env:
          NEXT_PUBLIC_GATEWAY_URL: ${{ vars.NEXT_PUBLIC_GATEWAY_URL || 'https://gateway.blackroad.ai' }}
          NEXT_PUBLIC_AGENTS_API_URL: ${{ vars.NEXT_PUBLIC_AGENTS_API_URL || 'https://agents.blackroad.ai' }}
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@f0a1cd58cd66095dee69bfa18fa5efd1dde93bca # v1.5.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: blackroad-web
          directory: .vercel/output/static
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: '3'

  # Deploy standalone workers for longer/heavier tasks
  deploy-workers:
    name: Deploy API Workers
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      matrix:
        worker:
          - gateway
          - agents
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Deploy ${{ matrix.worker }} worker
        run: |
          WORKER_DIR="workers/${{ matrix.worker }}"
          if [ -f "${WORKER_DIR}/wrangler.toml" ]; then
            npx wrangler@3 deploy --config "${WORKER_DIR}/wrangler.toml"
            echo "✓ Deployed ${{ matrix.worker }} worker"
          else
            echo "ℹ workers/${{ matrix.worker }}/wrangler.toml not found — skipping this worker"
          fi
